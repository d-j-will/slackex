x-app: &app-defaults
  image: ghcr.io/davewil/slackex:latest
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  environment: &app-env
    DATABASE_URL: "ecto://postgres:${POSTGRES_PASSWORD}@postgres/slackex_prod"
    REDIS_URL: "redis://redis:6379"
    PHX_HOST: "chat.davewil.dev"
    PHX_SERVER: "true"
    PORT: "4000"
    SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
    CLOAK_KEY: "${CLOAK_KEY}"
    CLOAK_HMAC_SECRET: "${CLOAK_HMAC_SECRET}"
    GUARDIAN_SECRET_KEY: "${GUARDIAN_SECRET_KEY}"
  expose:
    - "4000"
  networks:
    - default
    - proxy

services:
  app1:
    <<: *app-defaults
    hostname: app1
    environment:
      <<: *app-env
      RELEASE_NODE: "slackex@app1"

  app2:
    <<: *app-defaults
    hostname: app2
    environment:
      <<: *app-env
      RELEASE_NODE: "slackex@app2"

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: slackex_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:

networks:
  proxy:
    external: true
