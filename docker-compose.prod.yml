x-app: &app-defaults
  image: ghcr.io/davewil/slackex:latest
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  mem_limit: 2g
  environment: &app-env
    DATABASE_URL: "ecto://postgres:${POSTGRES_PASSWORD}@postgres/slackex_prod"
    REDIS_URL: "redis://redis:6379"
    PHX_HOST: "chat.davewil.dev"
    PHX_SERVER: "true"
    PORT: "4000"
    SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
    CLOAK_KEY: "${CLOAK_KEY}"
    CLOAK_HMAC_SECRET: "${CLOAK_HMAC_SECRET}"
    GUARDIAN_SECRET_KEY: "${GUARDIAN_SECRET_KEY}"
    FLAGS_ADMIN_USER: "${FLAGS_ADMIN_USER:-admin}"
    FLAGS_ADMIN_PASSWORD: "${FLAGS_ADMIN_PASSWORD}"
    EMBEDDING_API_KEY: "${EMBEDDING_API_KEY}"
    LLM_API_KEY: "${LLM_API_KEY}"
    BUMBLEBEE_CACHE_DIR: "/app/models"
    EXLA_TARGET: "host"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    OTEL_SERVICE_NAME: "slackex"
  volumes:
    - bumblebee_models:/app/models
  expose:
    - "4000"
  networks:
    - default
    - proxy

services:
  app1:
    <<: *app-defaults
    hostname: app1
    networks:
      default:
      proxy:
        aliases:
          - app1
    environment:
      <<: *app-env
      RELEASE_NODE: "slackex@app1"

  app2:
    <<: *app-defaults
    hostname: app2
    networks:
      default:
      proxy:
        aliases:
          - app2
    environment:
      <<: *app-env
      RELEASE_NODE: "slackex@app2"

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: slackex_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Observability stack ---

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - default

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=14d'
      - '--storage.tsdb.retention.size=2GB'
      - '--web.enable-remote-write-receiver'
    networks:
      - default

  tempo:
    image: grafana/tempo:latest
    restart: unless-stopped
    mem_limit: 256m
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    networks:
      - default

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - tempo
    networks:
      - default

volumes:
  pgdata:
  redisdata:
  bumblebee_models:
  prometheus_data:
  grafana_data:
  tempo_data:

networks:
  proxy:
    external: true
