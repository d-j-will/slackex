name: CI / Deploy

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      DATABASE_URL: ecto://postgres:postgres@localhost:5433/slackex_test
      REDIS_URL: redis://localhost:6379

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: slackex_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        id: setup
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.2"
          otp-version: "28.1.1"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-${{ env.MIX_ENV }}-otp${{ steps.setup.outputs.otp-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ env.MIX_ENV }}-otp${{ steps.setup.outputs.otp-version }}-

      - name: Cache Dialyzer PLTs
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plts-${{ runner.os }}-otp${{ steps.setup.outputs.otp-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: plts-${{ runner.os }}-otp${{ steps.setup.outputs.otp-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo
        run: mix credo

      - name: Dialyzer
        run: mix dialyzer --format github

      - name: Set up database
        run: mix ecto.create --quiet && mix ecto.migrate --quiet

      - name: Tests
        run: mix test --warnings-as-errors

      - name: Hex audit
        run: mix hex.audit

      - name: Check unused deps
        run: mix deps.unlock --check-unused

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/davewil/slackex:latest
            ghcr.io/davewil/slackex:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Deploy to Docker host
        env:
          FLAGS_ADMIN_USER: ${{ secrets.FLAGS_ADMIN_USER }}
          FLAGS_ADMIN_PASSWORD: ${{ secrets.FLAGS_ADMIN_PASSWORD }}
          CADDY_CF_TOKEN: ${{ secrets.CADDY_CF_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          # Copy deployment files to the server (ensures they stay in sync with the repo)
          scp docker-compose.prod.yml root@${{ secrets.DEPLOY_HOST }}:/root/slackex/docker-compose.prod.yml
          # Render Caddyfile template (substitute token) and deploy directly to the Caddy config path.
          # Do NOT use `import` directives — only the Caddyfile itself is bind-mounted into the
          # Caddy container; files written alongside it on the host are invisible inside.
          sed "s|\${CADDY_CF_TOKEN}|${CADDY_CF_TOKEN}|g" Caddyfile > /tmp/Caddyfile.rendered
          scp /tmp/Caddyfile.rendered root@${{ secrets.DEPLOY_HOST }}:/opt/caddy/Caddyfile

          # Ensure FLAGS_ADMIN credentials are in the server .env
          ssh root@${{ secrets.DEPLOY_HOST }} "
            grep -q '^FLAGS_ADMIN_USER=' /root/slackex/.env 2>/dev/null && \
              sed -i 's/^FLAGS_ADMIN_USER=.*/FLAGS_ADMIN_USER=${FLAGS_ADMIN_USER}/' /root/slackex/.env || \
              echo 'FLAGS_ADMIN_USER=${FLAGS_ADMIN_USER}' >> /root/slackex/.env
            grep -q '^FLAGS_ADMIN_PASSWORD=' /root/slackex/.env 2>/dev/null && \
              sed -i 's|^FLAGS_ADMIN_PASSWORD=.*|FLAGS_ADMIN_PASSWORD=${FLAGS_ADMIN_PASSWORD}|' /root/slackex/.env || \
              echo 'FLAGS_ADMIN_PASSWORD=${FLAGS_ADMIN_PASSWORD}' >> /root/slackex/.env
          "

          # Authenticate Docker on the server to pull from private GHCR
          echo "${{ secrets.GITHUB_TOKEN }}" | ssh root@${{ secrets.DEPLOY_HOST }} docker login ghcr.io -u ${{ github.actor }} --password-stdin

          ssh -o StrictHostKeyChecking=accept-new root@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd /root/slackex

            # Backup database before any changes (best-effort — don't fail deploy if backup fails)
            mkdir -p /root/slackex/backups
            echo "Creating pre-deploy database backup..."
            docker compose -f docker-compose.prod.yml exec -T postgres \
              pg_dump -U postgres -Fc slackex_prod < /dev/null > /root/slackex/backups/pre_deploy_$(date +%Y%m%d_%H%M%S).dump \
              && echo "Backup complete." || echo "Backup failed (non-fatal), continuing deploy..."

            # Prune old backups, keep last 10
            ls -t /root/slackex/backups/pre_deploy_*.dump 2>/dev/null | tail -n +11 | xargs -r rm --

            # Pull new image via Compose (ensures Compose tracks the updated digest)
            echo "Pulling latest image..."
            docker compose -f docker-compose.prod.yml pull app1 app2 2>&1
            echo "Pull complete."

            # Run migrations (once, via app1)
            echo "Running migrations..."
            docker compose -f docker-compose.prod.yml run --rm --no-TTY app1 bin/slackex eval "Slackex.Release.migrate()" < /dev/null 2>&1
            echo "Migrations complete."

            # Recreate app containers with the new image (--remove-orphans cleans up stale containers)
            echo "Recreating containers..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-build --remove-orphans app1 app2 2>&1
            echo "Containers started."

            # Pre-cache Bumblebee model in the shared Docker volume (best-effort).
            # Downloads on first deploy, no-op when already cached. This ensures
            # EmbeddingServing can load the model without network access on restart.
            echo "=== Bumblebee Model Provisioning ==="
            # Fix volume ownership (Docker creates volumes as root; app runs as appuser)
            docker compose -f docker-compose.prod.yml run --rm --no-TTY --user root \
              --entrypoint sh app1 -c 'chown -R appuser:appuser /app/models' < /dev/null 2>&1 \
              || echo "chown failed (non-fatal)"
            docker compose -f docker-compose.prod.yml run --rm --no-TTY app1 bin/slackex eval '
              Application.ensure_all_started(:inets)
              Application.ensure_all_started(:ssl)
              cache = System.get_env("BUMBLEBEE_CACHE_DIR", "/app/models")
              repo = {:hf, "sentence-transformers/all-MiniLM-L6-v2", cache_dir: cache}
              IO.puts("Caching model to #{cache}...")
              {:ok, _} = Bumblebee.load_model(repo)
              {:ok, _} = Bumblebee.load_tokenizer(repo)
              IO.puts("Model cached.")
            ' < /dev/null 2>&1 \
              && echo "Provisioning complete." \
              || echo "Model provisioning failed (non-fatal), continuing deploy..."

            # Restart Caddy to pick up the new config (rendered and SCPed above).
            # Full restart (not reload) clears stale DNS/connection state after container recreation.
            echo "Restarting Caddy..."
            docker restart caddy 2>&1 && echo "Caddy restarted." || echo "Caddy restart failed (non-fatal)"

            # Verify containers are healthy
            echo "Waiting for containers to start..."
            sleep 15

            echo "=== Container Status ==="
            docker compose -f docker-compose.prod.yml ps 2>&1

            # Smoke test: hit health endpoint on each app container
            echo "=== Smoke Test ==="
            SMOKE_FAILED=0

            for APP in app1 app2; do
              echo "Checking $APP..."
              HEALTH=$(docker compose -f docker-compose.prod.yml exec -T "$APP" curl -sf http://localhost:4000/health < /dev/null 2>&1) || {
                echo "FAIL: $APP health check unreachable"
                SMOKE_FAILED=1
                continue
              }
              echo "$APP: $HEALTH"

              # Verify response contains "ok"
              echo "$HEALTH" | grep -q '"status":"ok"' || {
                echo "FAIL: $APP returned unhealthy response"
                SMOKE_FAILED=1
              }
            done

            # Check clustering (allow 30s for nodes to discover each other)
            sleep 15
            echo "=== Cluster Check ==="
            CLUSTER=$(docker compose -f docker-compose.prod.yml exec -T app1 curl -sf http://localhost:4000/health < /dev/null 2>&1) || echo "Could not reach app1 for cluster check"
            echo "app1 cluster view: $CLUSTER"
            CLUSTER_SIZE=$(echo "$CLUSTER" | grep -o '"cluster_size":[0-9]*' | cut -d: -f2)
            if [ "$CLUSTER_SIZE" = "2" ]; then
              echo "PASS: Cluster formed (2 nodes)"
            else
              echo "WARN: Cluster size is ${CLUSTER_SIZE:-unknown}, expected 2 (nodes may still be joining)"
            fi

            if [ "$SMOKE_FAILED" = "1" ]; then
              echo "DEPLOY SMOKE TEST FAILED — containers may need manual intervention"
              exit 1
            fi

            echo "Deploy complete."
          EOF
