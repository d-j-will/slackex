# Local development observability stack.
#
# Usage:
#   docker compose -f docker-compose.observability.yml up -d
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 mix phx.server
#
# Then open:
#   Grafana:    http://localhost:3001  (admin / admin)
#   Prometheus: http://localhost:9090
#   Tempo:      http://localhost:3200  (via Grafana Explore)

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - ./infra/prometheus.dev.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=14d'
      - '--web.enable-remote-write-receiver'

  tempo:
    image: grafana/tempo:2.7.2
    restart: unless-stopped
    mem_limit: 256m
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - tempo

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
