journey:
  name: "Webhook Setup"
  goal: "Create an incoming webhook so external services can POST messages into a Slackex channel"
  persona: "Dave Williams -- solo developer, wants to dogfood Slackex for deploy notifications"

  emotional_arc:
    start: "Curious/Excited -- can I replace Discord with my own app?"
    middle: "Focused -- setting up the webhook, filling out the form"
    end: "Confident -- got the URL, ready to integrate"

steps:
  - id: 1
    name: "Navigate to Webhook Management"
    action: "Open Settings > Webhooks page in Slackex"

    shared_artifacts: []

    emotional_state:
      entry: "Curious -- where do I set this up?"
      exit: "Oriented -- found the page, empty state explains what to do"

    integration_checkpoint: |
      Webhook management page is accessible to authenticated users.
      Empty state is informative with clear call to action.

    gherkin: |
      Scenario: View empty webhook list
        Given Dave is logged into Slackex
        And no webhooks have been created
        When Dave navigates to Settings > Webhooks
        Then Dave sees an empty state explaining incoming webhooks
        And Dave sees a "Create Webhook" button

  - id: 2
    name: "Create Webhook"
    action: "Fill out webhook form with channel name, display name, description"

    shared_artifacts:
      - name: "webhook_token"
        source: "Generated by server on webhook creation (crypto-random, hashed for storage)"
        displayed_as: "${webhook_token}"
        consumers: ["webhook URL", "webhook detail page (shown once)", "HTTP request validation"]

      - name: "webhook_url"
        source: "Constructed from app base URL + /api/webhooks/ + token"
        displayed_as: "${webhook_url}"
        consumers: ["webhook confirmation page", "GitHub Actions secret", "curl test command"]

      - name: "channel_name"
        source: "User input or existing channel selection"
        displayed_as: "${channel_name}"
        consumers: ["webhook form", "webhook confirmation", "webhook list", "message delivery target"]

      - name: "bot_display_name"
        source: "User input on webhook form, defaults to 'Webhook'"
        displayed_as: "${bot_display_name}"
        consumers: ["webhook confirmation", "message sender display", "webhook list"]

    emotional_state:
      entry: "Focused -- filling out a simple form"
      exit: "Anticipating -- about to get the URL"

    integration_checkpoint: |
      Channel is created if it doesn't exist (via Chat.Channels.create_channel or find-or-create).
      Bot user is created with is_bot: true flag.
      Bot user is subscribed to the target channel.
      Webhook record stores hashed token, channel_id, bot_user_id.

    gherkin: |
      Scenario: Create webhook for existing channel
        Given Dave is on the Create Webhook page
        And the channel "#deploys" already exists
        When Dave selects "#deploys" as the channel
        And Dave enters "Deploy Bot" as the display name
        And Dave clicks "Create Webhook"
        Then a webhook is created for "#deploys"
        And a bot user named "Deploy Bot" is created with is_bot flag
        And the bot user is subscribed to "#deploys"
        And Dave sees the webhook URL with embedded token

      Scenario: Create webhook with auto-created channel
        Given Dave is on the Create Webhook page
        And no channel named "#monitoring" exists
        When Dave enters "monitoring" as the channel name
        And Dave clicks "Create Webhook"
        Then the "#monitoring" channel is auto-created
        And a webhook is created for "#monitoring"
        And the bot user is subscribed to "#monitoring"

  - id: 3
    name: "Copy Webhook URL"
    action: "Copy the webhook URL for use in external service configuration"

    shared_artifacts:
      - name: "webhook_url"
        source: "Constructed from app base URL + /api/webhooks/ + token"
        displayed_as: "${webhook_url}"
        consumers: ["clipboard", "GitHub Actions secret"]

    emotional_state:
      entry: "Anticipating -- seeing the URL for the first time"
      exit: "Confident -- have URL, know the payload format, ready to integrate"

    integration_checkpoint: |
      Token is displayed once and cannot be retrieved again.
      Curl example uses correct URL and payload format.
      Payload format documentation matches what the webhook controller accepts.

    gherkin: |
      Scenario: Copy webhook URL after creation
        Given Dave has just created a webhook for "#deploys"
        When the confirmation page loads
        Then Dave sees the full webhook URL
        And Dave sees a curl example with correct URL and JSON payload
        And Dave sees a warning that the token cannot be viewed again
        And Dave can copy the URL to clipboard

      Scenario: Token not visible after leaving page
        Given Dave created a webhook and navigated away
        When Dave returns to the webhook list
        Then Dave sees the webhook entry for "#deploys"
        But the token is not displayed
        And Dave sees an option to regenerate the token

integration_validation:
  shared_artifact_consistency:
    - artifact: "webhook_url"
      must_match_across: [2, 3]
      failure_message: "Webhook URL shown on confirmation page must match the URL constructed during creation"

    - artifact: "channel_name"
      must_match_across: [2, 3]
      failure_message: "Channel name in form must match channel name in confirmation"

    - artifact: "bot_display_name"
      must_match_across: [2, 3]
      failure_message: "Bot display name in form must match name in confirmation"
